<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Progressive Cardio Program</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ff3333">
<link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Progressive Cardio Program</h1>
    <p>Beginner → Intermediate endurance & cardio</p>
  </header>

  <main>
    <section class="week-selector">
      <label for="weekSelect">Week:</label>
      <select id="weekSelect">
        <option value="1">Week 1 (Beginner)</option>
        <option value="2">Week 2</option>
        <option value="3">Week 3</option>
        <option value="4">Week 4 (Intermediate-ish)</option>
      </select>
    </section>

    <section class="day-buttons">
      <button data-day="1" class="day-btn active">Day 1</button>
      <button data-day="2" class="day-btn">Day 2</button>
      <button data-day="3" class="day-btn">Day 3</button>
      <button data-day="4" class="day-btn">Day 4</button>
    </section>

    <section id="dayContent" class="card">
      <!-- Filled by JS -->
    </section>

    <section class="progress">
      <h2>Today’s Checklist</h2>
      <ul id="checklist">
        <!-- Filled by JS -->
      </ul>
    </section>
  </main>

  <footer>
    <p>Built for steady, confidence-building cardio.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
